version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: testforge-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: testforge
      POSTGRES_PASSWORD: tfg_G8xR7vN2mK4pY9qW6dC1sH5uJ3aL8e
      POSTGRES_DB: testforge

    ports:
      - "5433:5432"

    volumes:
      - ./postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testforge -d testforge"]
      interval: 10s
      timeout: 5s
      retries: 5