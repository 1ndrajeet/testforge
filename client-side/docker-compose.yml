version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: testforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: testforge
      POSTGRES_PASSWORD: tfg_G8xR7vN2mK4pY9qW6dC1sH5uJ3aL8e
      POSTGRES_DB: testforge

    ports:
      - "4935:5432"

    volumes:
      - ./data/postgres:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testforge -d testforge"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - testforge-network

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  migrate:
    image: 1ndrajeet/testforge-migrate:v1.0.0
    container_name: testforge-migrate
    restart: "no"

    environment:
      DATABASE_URL: postgresql://testforge:tfg_G8xR7vN2mK4pY9qW6dC1sH5uJ3aL8e@postgres:5432/testforge

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - testforge-network

  backend:
    image: 1ndrajeet/testforge-backend:latest
    container_name: testforge-backend
    restart: unless-stopped

    ports:
      - "4936:8000"

    environment:
      DATABASE_URL: postgresql://testforge:tfg_G8xR7vN2mK4pY9qW6dC1sH5uJ3aL8e@postgres:5432/testforge
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-ad85656193e23d2e5b8f21fa99064d1499d7d75200d63efae64b3f3b39ee2df4}
      BETTER_AUTH_URL: http://localhost:4937
      NEXT_PUBLIC_APP_URL: http://localhost:4937
      NEXT_PUBLIC_BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_HOSTED_URL: localhost:4937
      NODE_ENV: production
      LOG_LEVEL: INFO

    volumes:
      - ./data/uploads:/app/uploads

    depends_on:
      migrate:
        condition: service_completed_successfully

    networks:
      - testforge-network

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: 1ndrajeet/testforge-frontend:lightweight
    container_name: testforge-frontend
    restart: unless-stopped

    ports:
      - "4937:3000"

    environment:
      DATABASE_URL: postgresql://testforge:tfg_G8xR7vN2mK4pY9qW6dC1sH5uJ3aL8e@postgres:5432/testforge
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-ad85656193e23d2e5b8f21fa99064d1499d7d75200d63efae64b3f3b39ee2df4}
      BETTER_AUTH_URL: http://localhost:4937
      NEXT_PUBLIC_APP_URL: http://localhost:4937
      NEXT_PUBLIC_BACKEND_URL: http://localhost:4936
      NODE_ENV: production
      LOG_LEVEL: INFO

    depends_on:
      migrate:
        condition: service_completed_successfully
      backend:
        condition: service_started

    networks:
      - testforge-network

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  testforge-network:
    driver: bridge

volumes:
  postgres-data:
  uploads: